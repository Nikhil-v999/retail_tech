
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>DealDrop</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,300,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
            DealDrop ⚡
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">

                <!-- Always visible -->
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                </li>

                {% if current_user.is_authenticated %}

                    <!-- Role-based dashboard -->
                    {% if current_user.role == "retailer" %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('retailer_dashboard') }}">Dashboard</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('customer_dashboard') }}">Deals</a>
                        </li>
                    {% endif %}

                    <!-- Logout -->
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="{{ url_for('logout') }}">Logout</a>
                    </li>

                {% else %}

                    <!-- Login/Register -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('login', role='customer') }}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('register', role='customer') }}">Register</a>
                    </li>

                {% endif %}

                <!-- About -->
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- Spacer (prevents overlap with fixed navbar) -->
<div style="margin-top:80px;"></div>

</body>
</html>
